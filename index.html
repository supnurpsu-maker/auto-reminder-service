<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visa Reminder Registration</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
    body { font-family: 'Kanit', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
    #profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #00B900; margin: 0 auto 15px; display: none; }
    h2 { margin: 10px 0; color: #333; font-size: 1.1rem; }
    .input-group { text-align: left; margin-bottom: 15px; }
    label { font-size: 14px; color: #666; margin-left: 5px; }
    input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; font-family: 'Kanit'; }
    input:focus { border-color: #00B900; }
    button { width: 100%; padding: 14px; background: #00B900; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { font-size: 13px; color: #888; margin-top: 15px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <img id="profile-img" src="">
  <h2 id="display-name">Loading...</h2>
  
  <div id="form-section" class="hidden">
    <div class="input-group">
      <label>Student ID (10 digits)</label>
      <input type="number" id="stdId" placeholder="ex. 6412345678" oninput="validate()">
    </div>
    
    <div class="input-group">
      <label>Arrival Date or Date of your last 90-day report</label>
      <input type="date" id="arrivalDate" onchange="validate()">
    </div>

    <button id="submitBtn" onclick="sendData()" disabled>Register</button>
  </div>

  <div id="status">Connecting to LINE...</div>
</div>

<script>
  const LIFF_ID = "2009130967-umrbWER7"; 
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzLJtmWxhUWZ3oAy4WxGUnMe4jSivQq92mlqlIewPSnXPWK7_-8OGEq9j1mRLypXd8L6w/exec"; 

  let userProfile = null;

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); } 
      else {
        userProfile = await liff.getProfile();
        document.getElementById('profile-img').src = userProfile.pictureUrl;
        document.getElementById('profile-img').style.display = "block";
        document.getElementById('display-name').innerText = "User " + userProfile.displayName;
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('status').innerText = "Please fill out all required information.";
      }
    } catch (err) { document.getElementById('status').innerText = "Error: " + err.message; }
  }

  function validate() {
    const stdId = document.getElementById('stdId').value;
    const arrivalDate = document.getElementById('arrivalDate').value;
    document.getElementById('submitBtn').disabled = (stdId.length !== 10 || !arrivalDate);
  }

  async function sendData() {
    const stdId = document.getElementById('stdId').value;
    const arrivalDate = document.getElementById('arrivalDate').value;
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.innerText = "Saving...";

    try {
      await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          uid: userProfile.userId,
          stdId: stdId,
          arrivalDate: arrivalDate
        })
      });

      status.innerText = "Successfully saved! Closing...";
      setTimeout(() => liff.closeWindow(), 2000);
    } catch (err) {
      status.innerText = "Error occurred. Please try again.";
      btn.disabled = false;
    }
  }

  window.onload = main;
</script>
</body>
</html>
